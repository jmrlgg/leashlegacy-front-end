name: PR CI Snapshot Comment

on:
  workflow_run:
    workflows: ["Node.js CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment CI result + check snapshot on PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const { owner, repo } = context.repo;

            // Only runs tied to PRs
            const prs = run.pull_requests || [];
            if (prs.length === 0) return;

            const prNumber = prs[0].number;
            const headSha = run.head_sha;
            const shortSha = headSha.slice(0, 7);
            const runUrl = run.html_url;
            const conclusion = run.conclusion || "unknown";

            const checksUrl = `https://github.com/${owner}/${repo}/pull/${prNumber}/checks`;

            // Grab check-runs snapshot for that commit SHA
            const checkRunsResp = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: headSha,
              per_page: 100,
            });

            const checkRuns = checkRunsResp.data.check_runs || [];

            const toLine = (cr) => {
              const name = (cr.name || "check").replace(/[\r\n]/g, " ");
              const status = cr.status || "unknown";
              const conclusion = cr.conclusion || "";
              const state = status === "completed" ? (conclusion || "completed") : status;
              const url = cr.html_url || "";
              return url ? `- **${name}**: ${state} — ${url}` : `- **${name}**: ${state}`;
            };

            const lines = checkRuns
              .sort((a,b) => (a.name || "").localeCompare(b.name || ""))
              .slice(0, 15)
              .map(toLine);

            if (checkRuns.length > 15) lines.push(`- …and **${checkRuns.length - 15}** more`);

            const statusEmoji =
              conclusion === "success" ? "✅" :
              (conclusion === "failure" || conclusion === "timed_out" || conclusion === "cancelled") ? "❌" :
              "⚠️";

            const body = [
              `## ${statusEmoji} CI Snapshot for PR #${prNumber}`,
              `**Workflow:** ${run.name}`,
              `**Commit:** \`${shortSha}\``,
              `**Conclusion:** **${conclusion}**`,
              `**Run:** ${runUrl}`,
              `**Checks page:** ${checksUrl}`,
              ``,
              `### 🔎 Check Runs (snapshot)`,
              ...(lines.length ? lines : ["- (no check runs found)"]),
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
